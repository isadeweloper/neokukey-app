spring:
  application:
    name: CMS-premium
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  datasource:
    driverClassName: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cms}
    username: ${DB_USER:amirakupov}
    password: ${DB_PASSWORD:}
  security:
    user:
      name: admin
      password: admin
      roles: ADMIN
server:
  port: ${PORT:8080}
app:
  upload-dir: ${APP_UPLOAD_DIR:./uploads}

# Default ADMIN user seeded on first startup (when users table is empty).
# Override in production via env vars ADMIN_USERNAME / ADMIN_PASSWORD.
admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:admin}

yandex:
  gpt:
    api-key: ${YANDEX_GPT_API_KEY:your-api-key}
    folder-id: ${YANDEX_GPT_FOLDER_ID:your-folder-id}
    model: yandexgpt/latest

content:
  generation:
    cron: "0 0 8 * * *"
jwt:
  secret: ${JWT_SECRET:bmlnZ2EgZ2lnZ2EgbmlnZ2EgYmxhIGJsYSBuaWdnYSBmdWNrIGVuY3J5cHRpb24gbmlnZ2EgbmFtZQ==}
  expirationMs: ${JWT_EXPIRATION_MS:86400000}
