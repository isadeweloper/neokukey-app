# Render Blueprint — deploys the CMS backend (backend/) + a managed PostgreSQL.
# Render → New → Blueprint → connect the `neokukey` repo; Render reads this file.
# (The Next.js site at the repo root is deployed separately on Vercel, not here.)

databases:
  - name: neokukey-cms-db
    databaseName: cms
    user: cms
    plan: free

services:
  - type: web
    name: neokukey-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/cms/services
    autoDeploy: true
    envVars:
      # App listens on this port; Render routes to it.
      - key: PORT
        value: 8080
      # PostgreSQL connection — pulled from the managed database above and
      # consumed by application.yml (DB_HOST/DB_PORT/DB_NAME/DB_USER/DB_PASSWORD).
      - key: DB_HOST
        fromDatabase:
          name: neokukey-cms-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: neokukey-cms-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: neokukey-cms-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: neokukey-cms-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: neokukey-cms-db
          property: password
      # Generated once by Render and kept stable across deploys.
      - key: JWT_SECRET
        generateValue: true
      # Uploads are ephemeral on the free plan (no persistent disk). Attach a
      # Render Disk mounted at /data/uploads on a paid plan for persistence.
      - key: APP_UPLOAD_DIR
        value: /tmp/uploads
      # Optional: AI content generation. Set real values to enable.
      - key: YANDEX_GPT_API_KEY
        sync: false
      - key: YANDEX_GPT_FOLDER_ID
        sync: false
